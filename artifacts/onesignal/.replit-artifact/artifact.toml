kind = "web"
previewPath = "/"
title = "OneSignal"
version = "1.0.0"
id = "artifacts/onesignal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25107

[services.development]
run = "pnpm --filter @workspace/onesignal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onesignal", "run", "build" ]
publicDir = "artifacts/onesignal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25107"
BASE_PATH = "/"
